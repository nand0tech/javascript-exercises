<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Average</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <section>
      <input
        type="number"
        id="quantity"
        max="6"
        placeholder="How many notes?"
      />
      <p id="text" style="display: none">Whats your grade?</p>
      <div id="notes"></div>

      <button id="actionBtn" onclick="handleAction()">Create Notes</button>

      <p id="result">Choose the number of grades from 1 to 6.</p>
    </section>

    <script src="script.js"></script>
  </body>
</html>
